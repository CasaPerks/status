# CasaPerks status page — Upptime config
# Docs: https://upptime.js.org/docs/configuration
owner: CasaPerks
repo: status

sites:
  - name: API
    url: https://api.casaperks.com/api/
  - name: CasaPerks Web App
    url: https://admin.casaperks.com
  - name: WorksPerks Web App
    url: https://worksperks.com
    # Real users get a 302; the WAF was 403-blocking the bare probe → false "down".
    # Send a browser UA so the probe isn't treated as a bot.
    headers:
      - "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

  # --- Third-party dependencies (ANONYMIZED via Actions secrets) ---
  - name: Gift Card Fulfillment
    url: $GIFTCARD_PROVIDER_URL
  - name: SMS Delivery
    url: $SMS_PROVIDER_URL
  - name: Email Delivery
    url: $EMAIL_PROVIDER_URL

status-website:
  cname: status.casaperks.com
  name: CasaPerks Status
  logoUrl: "https://cdn.prod.website-files.com/6687f07a0165ef3b4fef297a/6687f07a0165ef3b4fef29ad_logo-orange.svg"
  favicon: "https://cdn.prod.website-files.com/66542016605ee0d4ac81af4a/66607f3f755789017d5e8586_favicon%20(1).png"
  theme: light
  introTitle: "CasaPerks — Status & Uptime"
  introMessage: Real-time and historical availability of CasaPerks services. Check back here during an incident.
  navbar:
    - title: Status
      href: /
    - title: "Report an issue"
      href: https://share.hsforms.com/1TzGsU8CzSdeGilIorVtiegshwmb
  css: |
    body { background-color: #FDF9F9 !important; }
    a, a:hover, a:focus { color: #F34926 !important; }
    h1, h2, h3 { color: #5F1E21 !important; }
