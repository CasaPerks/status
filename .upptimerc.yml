# CasaPerks status page — Upptime config
# Docs: https://upptime.js.org/docs/configuration
owner: CasaPerks
repo: status

sites:
  # --- First-party services (public URLs — fine to show) ---
  - name: API
    url: https://api.casaperks.com/api/
  - name: CasaPerks Web App
    url: https://admin.casaperks.com
  - name: WorksPerks Web App
    url: https://worksperks.com

  # --- Third-party dependencies (ANONYMIZED) ---
  # Display name is generic; the real vendor URL is a GitHub Actions secret,
  # so the vendor identity never appears in this public repo or on the page.
  # Add each secret in repo Settings → Secrets and variables → Actions.
  # Point each at a URL that returns 200 when the vendor is healthy
  # (their public status/health page is usually the safest target — an
  #  authenticated API endpoint will 401 from the probe and read as "down").
  - name: Gift Card Fulfillment
    url: $GIFTCARD_PROVIDER_URL
  - name: SMS Delivery
    url: $SMS_PROVIDER_URL
  - name: Email Delivery
    url: $EMAIL_PROVIDER_URL

status-website:
  cname: status.casaperks.com
  name: CasaPerks Status
  introTitle: "**CasaPerks** — Status & Uptime"
  introMessage: Real-time and historical availability of CasaPerks services. Check back here during an incident.
  navbar:
    - title: Status
      href: /
    - title: "Report an issue"
      href: https://github.com/CasaPerks/status/issues
